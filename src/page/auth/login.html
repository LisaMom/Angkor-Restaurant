<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
   <link rel="icon" type="image/png" href="/src/img/remove-logo.png">
         <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Angkor Travel" />
    <meta property="og:description" content="Beyond the sacred stones and jungle shadows, we guide you to a place where history breathes and your own journey of discovery begins."/>
    <meta property="og:image" content="/src/img/remove-logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
      display: none;
    }
  </style>  
</head>
    
<body>
  <div x-data="authPage()" class="min-h-screen bg-gray-100">
    <!-- Auth Pages -->
    <div class="min-h-screen flex">
      <!-- Left Side - Auth Forms -->
      <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
          <!-- Form Container -->
          <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
              <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
                <i x-show="isLogin" class="fas fa-sign-in-alt text-blue-600 fa-lg"></i>
                <i x-show="!isLogin" class="fas fa-user-plus text-blue-600 fa-lg"></i>
              </div>
              <h2 class="text-2xl font-bold text-gray-800">
                <span x-text="isLogin ? 'Welcome Back!' : 'Create Account'"></span>
              </h2>
              <p class="text-gray-600 mt-2">
                <span x-text="isLogin ? 'Please sign in to continue' : 'Get started with your account'"></span>
              </p>
            </div>

            <!-- Form -->
            <form @submit.prevent="handleSubmit">

              <!-- Email Field -->
              <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email <span style="color: red;">*</span></label>
                <div class="relative">
                  <input
                    type="email"
                    x-model="email"∆
                    required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-colors"
                    placeholder="you@example.com"
                  />
                  <i class="fas fa-envelope absolute right-2 top-4 w-6 h-6 text-gray-400"></i>
                </div>
              </div>

              <!-- Password Field -->
              <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Password<span style="color: red;">*</span></label>
                <div class="relative">
                  <input
                    :type="showPassword ? 'text' : 'password'"
                    x-model="password"
                    required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-colors"
                    placeholder="••••••••"
                  />
                  <i class="fa-solid fa-lock absolute right-2 top-4 w-6 h-6 text-gray-400"></i>
                </div>
                <p x-show="password && !validatePassword(password)" class="mt-2 text-sm text-blue-600">Password must be at least 8 characters</p>
              </div>

              <!-- Submit Button -->
              <button
                type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 focus:ring-4 focus:ring-blue-600 focus:ring-opacity-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                :disabled="
                  loading ||
                  (email && !validateEmail(email)) ||
                  (password && !validatePassword(password)) ||
                  (!isLogin && confirmPassword && !validateConfirmPassword())
                "
              >
                <span x-show="loading" class="inline-flex items-center">
                  <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  Processing...
                </span>
                <span x-show="!loading" x-text="isLogin ? 'Sign In' : 'Create Account'"></span>
              </button>

              <!-- Form Switch -->
              <p class="mt-6 text-center text-gray-600">
                <span x-text="isLogin ? 'Don\'t have an account?' : 'Already have an account?'"></span>
              <a href="/src/page/auth/register.html" class="text-blue-600 hover:underline">
              Sign up
            </a>
              </p>
            </form>
          </div>
        </div>
      </div>

      <!-- Right Side - Image -->
      <div
        class="hidden lg:block lg:w-1/2 bg-cover bg-center"
        style="background-image: url('https://img.freepik.com/premium-photo/joyful-road-trip-through-lush-mountains_332713-6651.jpg?semt=ais_incoming&w=740&q=80')"
      >
        <div class="h-full bg-black bg-opacity-50 flex items-center justify-center">
          <div class="text-center text-white px-12">
            <h2 class="text-4xl font-bold mb-6">Let's Trip Together</h2>
            <p class="text-xl">Pack your bags and find your tribe. Register now to plan, share, and experience the ultimate Cambodian road trip.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('authPage', () => ({
        isLogin: true,
        showPassword: false,
        showConfirmPassword: false,
        email: '',
        password: '',
        confirmPassword: '',
        name: '',
        loading: false,

        validateEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        },

        validatePassword(password) {
          return password.length >= 8;
        },

        validateConfirmPassword() {
          return this.password === this.confirmPassword;
        },

        handleSubmit() {
          this.loading = true;
          // Simulate API call
          setTimeout(() => {
            this.loading = false;
            alert(this.isLogin ? 'Logged in successfully!' : 'Registered successfully!');
          }, 1500);
        }
      }));
    });
  </script>
</body>
</html>
</body>
</html>
